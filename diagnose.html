<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Diagnose — mirazhossain.com</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root { --ok:#16a34a; --fail:#dc2626; --warn:#d97706; --muted:#64748b; }
  body { font-family: -apple-system,BlinkMacSystemFont,"SF Pro Text",Segoe UI,Roboto,sans-serif;
         margin: 0; padding: 24px; max-width: 820px; background:#fafafa; color:#111; }
  h1 { font-size: 22px; margin: 0 0 6px; }
  p.sub { color: var(--muted); margin: 0 0 24px; font-size: 14px; }
  .row { display:flex; align-items:flex-start; gap:12px; padding:12px 14px; border:1px solid #e5e7eb;
         background:#fff; border-radius:8px; margin-bottom:8px; font-size:14px; }
  .row .dot { width:10px; height:10px; border-radius:50%; margin-top:5px; background:#d1d5db; flex:0 0 auto; }
  .row.ok   .dot { background: var(--ok); }
  .row.fail .dot { background: var(--fail); }
  .row.warn .dot { background: var(--warn); }
  .row .label { flex: 1; }
  .row .label code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size:12px; color:#334155; background:#f1f5f9; padding:1px 6px; border-radius:4px; }
  .row .status { font-size: 12px; color: var(--muted); font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
  .row.ok   .status { color: var(--ok); }
  .row.fail .status { color: var(--fail); }
  .row.warn .status { color: var(--warn); }
  .note { font-size:12px; color:var(--muted); margin-top:4px; }
  .panel { background:#fff; border:1px solid #e5e7eb; border-radius:8px; padding:14px; margin-top:20px; font-size:13px; }
  .panel h2 { font-size: 14px; margin:0 0 8px; text-transform: uppercase; letter-spacing:0.06em; color:#475569; }
  pre { background:#0f172a; color:#e2e8f0; padding:10px 12px; border-radius:6px; font-size:12px; overflow:auto; }
  .actions { margin-top: 16px; }
  a.btn { display:inline-block; padding:10px 14px; background:#0f172a; color:#fff; text-decoration:none; border-radius:6px; font-size:13px; }
  a.btn + a.btn { margin-left: 8px; background:#475569; }
</style>
</head>
<body>

<h1>Site diagnostic</h1>
<p class="sub">This page reports exactly what loads (and what doesn't) from your ExonHost server. Upload it alongside the rest of the site, then open <code>mirazhossain.com/diagnose.html</code>.</p>

<div id="report"></div>

<div class="panel">
  <h2>Live browser info</h2>
  <div id="browser-info"></div>
</div>

<div class="panel">
  <h2>Raw log</h2>
  <pre id="log">Running…</pre>
</div>

<div class="actions">
  <a class="btn" href="index.html">Back to site</a>
  <a class="btn" href="#" onclick="copyLog();return false;">Copy full log</a>
</div>

<script>
(function () {
  var report = document.getElementById('report');
  var log    = document.getElementById('log');
  var bi     = document.getElementById('browser-info');
  var lines  = [];

  function add(label, state, detail) {
    var row = document.createElement('div');
    row.className = 'row ' + state;
    row.innerHTML =
      '<span class="dot"></span>' +
      '<span class="label">' + label + (detail ? '<div class="note">' + detail + '</div>' : '') + '</span>' +
      '<span class="status">' + state.toUpperCase() + '</span>';
    report.appendChild(row);
    lines.push('[' + state.toUpperCase() + '] ' + label + (detail ? ' — ' + detail : ''));
    log.textContent = lines.join('\n');
  }

  // 1) Basic page protocol
  add('Served over <code>' + location.protocol + '</code>', location.protocol === 'https:' ? 'ok' : (location.protocol === 'http:' ? 'warn' : 'fail'),
      'Host: ' + location.host);

  // 2) Can we reach the CSS?
  function checkAsset(url, label, kind) {
    return new Promise(function (resolve) {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url + '?t=' + Date.now());
      xhr.onload = function () {
        var ct = xhr.getResponseHeader('Content-Type') || '';
        var ok = xhr.status >= 200 && xhr.status < 400;
        add(label + ' <code>' + url + '</code>', ok ? 'ok' : 'fail',
            'HTTP ' + xhr.status + ' · ' + (ct || 'no Content-Type') + ' · ' + (xhr.responseText ? xhr.responseText.length + ' bytes' : '0 bytes'));
        resolve(ok);
      };
      xhr.onerror = function () {
        add(label + ' <code>' + url + '</code>', 'fail', 'Network error / blocked');
        resolve(false);
      };
      xhr.send();
    });
  }

  // 3) Image load test
  function checkImage(url, label) {
    return new Promise(function (resolve) {
      var img = new Image();
      img.onload  = function () { add(label + ' <code>' + url + '</code>', 'ok',   img.naturalWidth + '×' + img.naturalHeight); resolve(true); };
      img.onerror = function () { add(label + ' <code>' + url + '</code>', 'fail', 'Image failed to load'); resolve(false); };
      img.src = url + '?t=' + Date.now();
    });
  }

  // 4) JS class check (only meaningful once main.js has run)
  function checkJs() {
    var hasReveal = typeof window.__reInitReveal === 'function';
    add('External <code>assets/js/main.js</code> loaded and ran', hasReveal ? 'ok' : 'warn',
        hasReveal ? '__reInitReveal() is defined'
                  : 'External script did not run. (This is OK — every page now ships with main.js inlined as a fallback, so animations still work.)');
  }

  // 5) Browser info
  bi.innerHTML =
    '<div><strong>User agent:</strong> ' + navigator.userAgent + '</div>' +
    '<div><strong>Viewport:</strong> ' + window.innerWidth + '×' + window.innerHeight + '</div>' +
    '<div><strong>Protocol:</strong> ' + location.protocol + '</div>' +
    '<div><strong>Path:</strong> ' + location.pathname + '</div>';

  // Run the checks in sequence
  (async function () {
    await checkAsset('assets/css/style.css',      'CSS',             'css');
    await checkAsset('assets/js/main.js',         'JS (main)',       'js');
    await checkAsset('assets/js/beyond.js',       'JS (beyond)',     'js');
    await checkAsset('content/beyond.json',       'JSON (beyond)',   'json');
    await checkAsset('content/articles.json',     'JSON (archive)',  'json');
    await checkAsset('content/certificates.json', 'JSON (creds)',    'json');
    await checkImage('assets/images/profile.jpg',           'Image (profile)');
    await checkImage('assets/images/about-portrait.jpg',    'Image (about)');
    await checkImage('assets/images/beyond-literature.jpg', 'Image (beyond-literature)');
    await checkAsset('https://fonts.googleapis.com/css2?family=DM+Serif+Display&display=swap', 'Google Fonts CSS', 'font');
    checkJs();

    // Reveal animation probe — if the CSS is loaded, .reveal rules exist
    var probe = document.createElement('div');
    probe.className = 'reveal';
    probe.style.cssText = 'position:absolute;left:-9999px;';
    document.body.appendChild(probe);
    var s = getComputedStyle(probe);
    var cssOk = s.opacity && parseFloat(s.opacity) < 1;
    add('Reveal-animation CSS rule present', cssOk ? 'ok' : 'fail',
        cssOk ? 'opacity=' + s.opacity : 'opacity=' + s.opacity + ' (style.css did not apply .reveal)');
    document.body.removeChild(probe);
  })();

  window.copyLog = function () {
    var text = lines.join('\n') + '\n\n' + document.getElementById('browser-info').innerText;
    if (navigator.clipboard) navigator.clipboard.writeText(text).then(function () { alert('Copied!'); });
    else { var ta = document.createElement('textarea'); ta.value = text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('Copied!'); }
  };
})();
</script>
</body>
</html>
